name: Deploy to GitHub Pages

on:
  push:
    branches: [deploy]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to deploy from (must contain outputs/*.json)"
        default: deploy

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'deploy' }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Check extraction outputs exist
        run: |
          count=$(find outputs/ -name '*.json' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No outputs/*.json found. Run the extraction pipeline locally and commit the JSON files to the deploy branch before deploying."
            exit 1
          fi
          echo "Found $count extraction output files"

      - name: Build viewer (split)
        run: python build_viewer.py --split

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
