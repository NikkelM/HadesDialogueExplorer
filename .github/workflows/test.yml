name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: pip install -r requirements-dev.txt

      - run: npm ci

      - name: Python tests
        run: pytest -q

      - name: JS tests
        run: npm test

      - name: JS lint
        run: npm run lint
