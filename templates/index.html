<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hades Dialogue Dependency Explorer</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>
<header>
    <h1>Hades Dialogue Dependency Explorer</h1>
    <div id="game-toggle" class="game-toggle" role="tablist" aria-label="Game"></div>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search textline names or dialogue text..." autocomplete="off">
        <div id="search-results">
            <div id="search-names-header" class="search-section-header" hidden>Name matches</div>
            <div id="search-names-list"></div>
            <div id="search-text-header" class="search-section-header" hidden>Text matches</div>
            <div id="search-text-list"></div>
        </div>
    </div>
    <div class="stats" id="stats"></div>
</header>
<!-- Stable mount for viewer.js to render a load error into without
     clobbering the page chrome. Initially hidden; showLoadError()
     reveals it on fetch/JSON.parse failure. -->
<div id="app-error" class="app-error" hidden></div>
<main>
    <div class="panel" id="panel-info">
        <h2>Textline Details</h2>
        <div id="info-content" class="panel-body"><div class="empty-state">Select a textline to see its details</div></div>
    </div>
    <div class="panel" id="panel-upstream">
        <h2>↑ Prerequisites (what it requires)</h2>
        <div id="upstream-content" class="panel-body"><div class="empty-state">Select a textline to see its prerequisites</div></div>
    </div>
    <div class="panel" id="panel-downstream">
        <h2>↓ Dependents (what requires it)</h2>
        <div id="downstream-content" class="panel-body"><div class="empty-state">Select a textline to see what depends on it</div></div>
    </div>
</main>
<!-- Script kept at end of body so the DOM is fully parsed before
     ``boot()`` runs. The bundler inserts a sibling
     ``<script type="application/json" id="viewer-data">`` immediately
     before this tag for the offline single-file build. -->
<script src="viewer.js"></script>
</body>
</html>
