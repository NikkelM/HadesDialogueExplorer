<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hades Dialogue Dependency Explorer</title>
<style>
/* __CSS_PLACEHOLDER__ */
</style>
</head>
<body>
<header>
    <h1>🎵 Dialogue Dependency Explorer</h1>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search textlines... (e.g. OrpheusSingsAgain02)" autocomplete="off">
        <div id="search-results"></div>
    </div>
    <div class="stats" id="stats"></div>
</header>
<main>
    <div class="panel" id="panel-info">
        <h2>Textline Details</h2>
        <div id="info-content"><div class="empty-state">Search for a textline to see its details</div></div>
    </div>
    <div class="panel" id="panel-upstream">
        <h2>↑ Prerequisites (what it requires)</h2>
        <div id="upstream-content"><div class="empty-state">Select a textline to see its prerequisites</div></div>
    </div>
    <div class="panel" id="panel-downstream">
        <h2>↓ Dependents (what requires it)</h2>
        <div id="downstream-content"><div class="empty-state">Select a textline to see what depends on it</div></div>
    </div>
</main>
<script>
/* __DATA_PLACEHOLDER__ */

// --- Data Layer ---

function loadData() {
    return {
        textlines: DATA.textlines,
        dependents: DATA.dependents,
        stats: DATA.stats,
        allNames: Object.keys(DATA.textlines).sort(),
    };
}

const { textlines, dependents, stats, allNames } = loadData();

// --- Utilities ---

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getEdgeClass(type) {
    if (type.includes('False')) return 'edge-false';
    if (type.includes('Any')) return 'edge-any';
    return 'edge-all';
}

function getEdgeLabel(type) {
    if (type === 'RequiredTextLines') return 'ALL';
    if (type === 'RequiredAnyTextLines') return 'ANY';
    if (type === 'RequiredAnyOtherTextLines') return 'ANY';
    if (type === 'RequiredFalseTextLines') return '\u00AC';
    if (type === 'RequiredFalseQueuedTextLines') return '\u00ACQ';
    if (type.includes('False')) return '\u00AC';
    if (type.includes('Any')) return 'ANY';
    return 'ALL';
}

function formatReqType(type) {
    const map = {
        'RequiredTextLines': 'Required (ALL)',
        'RequiredAnyTextLines': 'Required (ANY)',
        'RequiredAnyOtherTextLines': 'Required (ANY other)',
        'RequiredFalseTextLines': 'Must NOT have played',
        'RequiredFalseQueuedTextLines': 'Must NOT be queued',
        'RequiredFalseTextLinesThisRun': 'Must NOT have played (this run)',
        'RequiredFalseTextLinesLastRun': 'Must NOT have played (last run)',
        'RequiredTextLinesThisRun': 'Required (this run)',
        'RequiredTextLinesLastRun': 'Required (last run)',
        'RequiredAnyTextLinesThisRun': 'Required ANY (this run)',
        'RequiredAnyTextLinesLastRun': 'Required ANY (last run)',
    };
    return map[type] || type;
}

// --- Stats Component ---

function initStats() {
    document.getElementById('stats').textContent =
        `${stats.totalNPCs} NPCs \u00B7 ${stats.totalTextlines} textlines \u00B7 ${stats.totalEdges} edges \u00B7 ${stats.unresolvedRefs.length} external refs`;
}

// --- Search Component ---

function initSearch() {
    const searchInput = document.getElementById('search');
    const searchResults = document.getElementById('search-results');

    searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase().trim();
        if (!q) { searchResults.classList.remove('visible'); return; }
        const matches = allNames.filter(n => n.toLowerCase().includes(q)).slice(0, 30);
        if (matches.length === 0) { searchResults.classList.remove('visible'); return; }
        searchResults.innerHTML = matches.map(n => {
            const tl = textlines[n];
            return `<div class="search-item" data-name="${n}">${n}<span class="npc">${tl.npc} \u00B7 ${tl.section.replace('TextLineSets', '')}</span></div>`;
        }).join('');
        searchResults.classList.add('visible');
    });

    searchResults.addEventListener('click', (e) => {
        const item = e.target.closest('.search-item');
        if (item) {
            selectTextline(item.dataset.name);
            searchResults.classList.remove('visible');
            searchInput.value = item.dataset.name;
        }
    });

    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const first = searchResults.querySelector('.search-item');
            if (first) {
                selectTextline(first.dataset.name);
                searchResults.classList.remove('visible');
                searchInput.value = first.dataset.name;
            }
        }
        if (e.key === 'Escape') searchResults.classList.remove('visible');
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) searchResults.classList.remove('visible');
    });
}

// --- Info Panel Component ---

function renderInfo(name) {
    const tl = textlines[name];
    const container = document.getElementById('info-content');
    if (!tl) {
        container.innerHTML = `<div class="textline-info"><h3>${name}</h3><div class="meta"><span>\u26A0 External/unresolved reference - not found in any parsed data file</span></div><div class="meta"><span>This line is referenced as a requirement by other dialogues but is defined in a data file that hasn't been parsed yet.</span></div></div>`;
        return;
    }
    let html = `<div class="textline-info">
        <h3>${name}</h3>
        <div class="meta">
            <span>NPC: ${tl.npc}</span>
            <span>Section: ${tl.section.replace('TextLineSets', '')}</span>
            <span>Source: ${tl.source || 'Unknown'}</span>
            <span>Line: ${tl.line}</span>
        </div>`;

    // Dialogue text with speaker names
    if (tl.dialogueLines && tl.dialogueLines.length > 0) {
        html += `<div class="dialogue-section"><h4>Dialogue</h4>`;
        for (const line of tl.dialogueLines) {
            if (typeof line === 'object' && line.speaker) {
                html += `<div class="dialogue-line"><span class="speaker">${escapeHtml(line.speaker)}:</span> ${escapeHtml(line.text)}</div>`;
            } else if (typeof line === 'object') {
                html += `<div class="dialogue-line">${escapeHtml(line.text || '')}</div>`;
            } else {
                html += `<div class="dialogue-line">${escapeHtml(line)}</div>`;
            }
        }
        html += `</div>`;
    }

    // Textline requirements
    for (const [type, refs] of Object.entries(tl.requirements)) {
        html += `<div class="req-section req-type-${type}"><h4>${formatReqType(type)}</h4>`;
        for (const ref of refs) {
            const resolved = ref in textlines;
            html += `<div class="req-item ${resolved ? 'resolved' : 'unresolved'}" data-name="${ref}" onclick="navigateTo('${ref}')">${ref}</div>`;
        }
        html += `</div>`;
    }

    // Other requirements
    if (Object.keys(tl.otherRequirements).length > 0) {
        html += `<div class="req-section req-type-other"><h4>Other Requirements</h4>`;
        for (const [key, val] of Object.entries(tl.otherRequirements)) {
            const display = typeof val === 'object' ? JSON.stringify(val) : String(val);
            html += `<div class="other-req-item">${escapeHtml(key)} = ${escapeHtml(display)}</div>`;
        }
        html += `</div>`;
    }

    html += `</div>`;
    container.innerHTML = html;
}

// --- Tree Component ---

function buildTree(name, direction, visited, depth, maxDepth) {
    if (depth > maxDepth) return `<div class="tree-node"><span class="cycle-marker">... max depth reached</span></div>`;
    if (visited.has(name)) return `<div class="tree-node"><span class="cycle-marker">\u21A9 ${name} (cycle)</span></div>`;

    visited = new Set(visited);
    visited.add(name);

    const tl = textlines[name];
    const isRoot = depth === 0;
    let children = [];

    if (direction === 'upstream' && tl) {
        for (const [type, refs] of Object.entries(tl.requirements)) {
            for (const ref of refs) {
                children.push({ name: ref, edgeType: type });
            }
        }
    } else if (direction === 'downstream') {
        const deps = dependents[name] || [];
        for (const dep of deps) {
            children.push({ name: dep.name, edgeType: dep.type });
        }
    }

    const hasChildren = children.length > 0;
    const npcTag = tl ? tl.npc.replace('NPC_', '').replace('_01', '') : '?';
    const toggle = hasChildren ? '\u25B6' : '\u00B7';
    const expanded = isRoot ? 'expanded' : '';

    let html = `<div class="tree-node ${isRoot ? 'root' : ''}">`;
    html += `<div class="tree-label ${isRoot ? 'active' : ''}" data-name="${name}">`;
    html += `<span class="toggle">${toggle}</span>`;
    html += `<span class="name">${name}</span>`;
    if (!tl) html += `<span style="color:#666;font-size:10px;margin-left:4px">\u26A0</span>`;
    html += `<span class="npc-tag">${npcTag}</span>`;
    html += `</div>`;

    if (hasChildren) {
        html += `<div class="tree-children ${expanded}">`;
        for (const child of children) {
            html += buildTreeChild(child, direction, visited, depth, maxDepth);
        }
        html += `</div>`;
    }
    html += `</div>`;
    return html;
}

function buildTreeChild(child, direction, visited, depth, maxDepth) {
    const edgeClass = getEdgeClass(child.edgeType);
    const edgeLabel = getEdgeLabel(child.edgeType);
    const childTl = textlines[child.name];
    const childHasChildren = direction === 'upstream'
        ? (childTl && Object.values(childTl.requirements).some(r => r.length > 0))
        : ((dependents[child.name] || []).length > 0);
    const childToggle = childHasChildren && !visited.has(child.name) ? '\u25B6' : '\u00B7';
    const childNpc = childTl ? childTl.npc.replace('NPC_', '').replace('_01', '') : '?';

    let html = `<div class="tree-node">`;
    html += `<div class="tree-label" data-name="${child.name}">`;
    html += `<span class="toggle">${childToggle}</span>`;
    html += `<span class="edge-type ${edgeClass}">${edgeLabel}</span>`;
    html += `<span class="name">${child.name}</span>`;
    if (!childTl) html += `<span style="color:#666;font-size:10px;margin-left:4px">\u26A0</span>`;
    html += `<span class="npc-tag">${childNpc}</span>`;
    html += `</div>`;
    if (childHasChildren && !visited.has(child.name)) {
        html += `<div class="tree-children">${buildTreeChildren(child.name, direction, visited, depth + 1, maxDepth)}</div>`;
    } else if (visited.has(child.name)) {
        html += `<span class="cycle-marker" style="margin-left:28px">\u21A9 cycle</span>`;
    }
    html += `</div>`;
    return html;
}

function buildTreeChildren(name, direction, visited, depth, maxDepth) {
    if (depth > maxDepth) return `<span class="cycle-marker">... max depth</span>`;
    if (visited.has(name)) return `<span class="cycle-marker">\u21A9 cycle</span>`;

    visited = new Set(visited);
    visited.add(name);

    const tl = textlines[name];
    let children = [];

    if (direction === 'upstream' && tl) {
        for (const [type, refs] of Object.entries(tl.requirements)) {
            for (const ref of refs) {
                children.push({ name: ref, edgeType: type });
            }
        }
    } else if (direction === 'downstream') {
        const deps = dependents[name] || [];
        for (const dep of deps) {
            children.push({ name: dep.name, edgeType: dep.type });
        }
    }

    let html = '';
    for (const child of children) {
        html += buildTreeChild(child, direction, visited, depth, maxDepth);
    }
    return html;
}

function attachTreeListeners(container) {
    container.querySelectorAll('.tree-label').forEach(label => {
        if (!label.closest('.tree-node.root') || label.closest('.tree-node.root') !== label.parentElement) {
            const btn = document.createElement('span');
            btn.className = 'focus-btn';
            btn.title = 'Focus on this dialogue';
            btn.textContent = '\u2934';
            label.appendChild(btn);
        }
        label.addEventListener('click', (e) => {
            const name = label.dataset.name;
            if (e.target.classList.contains('focus-btn')) {
                navigateTo(name);
                return;
            }
            const children = label.nextElementSibling;
            if (children && children.classList.contains('tree-children')) {
                const isExpanded = children.classList.contains('expanded');
                children.classList.toggle('expanded');
                const toggle = label.querySelector('.toggle');
                if (toggle) toggle.textContent = isExpanded ? '\u25B6' : '\u25BC';
            }
            renderInfo(name);
        });
        label.addEventListener('dblclick', () => {
            navigateTo(label.dataset.name);
        });
    });
}

// --- Tree Panel Renderers ---

function renderUpstream(name, maxDepth = 10) {
    const container = document.getElementById('upstream-content');
    container.innerHTML = buildTree(name, 'upstream', new Set(), 0, maxDepth);
    attachTreeListeners(container);
}

function renderDownstream(name, maxDepth = 10) {
    const container = document.getElementById('downstream-content');
    container.innerHTML = buildTree(name, 'downstream', new Set(), 0, maxDepth);
    attachTreeListeners(container);
}

// --- Navigation ---

function selectTextline(name) {
    renderInfo(name);
    renderUpstream(name);
    renderDownstream(name);
}

function navigateTo(name) {
    selectTextline(name);
    document.getElementById('search').value = name;
    window.location.hash = name;
}

// --- Init ---

function init() {
    initStats();
    initSearch();

    // Handle URL hash for deep linking
    if (window.location.hash) {
        const name = decodeURIComponent(window.location.hash.slice(1));
        if (name in textlines) {
            selectTextline(name);
            document.getElementById('search').value = name;
        }
    }
}

init();
</script>
</body>
</html>
